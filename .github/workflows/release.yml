name: Release

# Build installers on every version tag (e.g. v0.1.0) and upload them to a
# GitHub Release. electron-builder publishes to a *draft* release by default,
# so you can review the assets and write notes before hitting "Publish".
on:
  push:
    tags:
      - 'v*'

# Required so the built-in GITHUB_TOKEN can create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      # Linux: electron-builder needs libgtk-3-dev and libnotify for desktop
      # integration metadata; dpkg-deb is used to verify the .deb artifact.
      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package & publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always

      # Linux: verify the .deb is a valid package (not a zero-byte stub from
      # cross-build). Cross-building .deb on macOS produces an invalid ~96-byte
      # file, so this check must run on a real Ubuntu runner.
      - name: Verify Linux .deb artifact
        if: matrix.platform == 'linux'
        run: |
          DEB_FILE=$(ls dist/*.deb 2>/dev/null | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "::error::No .deb file found in dist/"
            exit 1
          fi
          echo "Found: $DEB_FILE"
          echo "Size: $(stat -c%s "$DEB_FILE") bytes"
          dpkg-deb --info "$DEB_FILE"
          echo "✅ .deb artifact is valid"
